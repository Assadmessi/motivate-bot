<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Daily Motivation Bot</title>
</head>
<body>
    <main class="app">
        <div class="topbar">
            <h1 id="appTitle">Daily Motivation Bot</h1>

            <label class="lang-switch" for="languageSelect">
                <span id="languageLabel">Language</span>
                <select id="languageSelect" aria-label="Language switcher">
                    <option value="en">English</option>
                    <option value="my">မြန်မာ</option>
                </select>
            </label>
        </div>

        <label>
            <span id="nameLabel">Your name</span>
            <input type="text" name="name" id="nameInput" placeholder="Enter your name">
        </label>

        <label>
            <span id="moodLabel">Your mood</span>
            <select id="moodSelect">
                <option value="" id="moodPlaceholder">Select mood...</option>
                <option value="sad" data-i18n="moodSad">Sad</option>
                <option value="happy" data-i18n="moodHappy">Happy</option>
                <option value="tired" data-i18n="moodTired">Tired</option>
                <option value="stressed" data-i18n="moodStressed">Stressed</option>
            </select>
        </label>

        <div class="actions">
            <button id="getBtn" type="button">Get Motivation</button>
            <button id="resetBtn" type="button">Reset</button>
        </div>

        <section class="output">
            <h2 id="botSaysTitle">Bot says:</h2>
            <p id="messageOutput">Your message will appear here</p>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
